name: Task9_1P CI

on:
  push:
    paths:
      - 'task9_1P/**'
  pull_request:
    paths:
      - 'task9_1P/**'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - uses: actions/setup-java@v5
      with:
        distribution: temurin
        java-version: '21'
        cache: maven

    - name: Run tests for Task 9
      working-directory: task9_1P
      run: mvn clean test